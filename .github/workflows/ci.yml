name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt pytest httpx
      - run: cd backend && python -m pytest tests -v --tb=short
      - uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage.xml
        continue-on-error: true

  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install black ruff
      - run: black backend --check --verbose
      - run: ruff check backend --verbose

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint
      - run: cd frontend && npm run test -- --run

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v2
      - run: cd backend && docker build -f Dockerfile -t phish-mail-backend:latest .
      - run: cd frontend && docker build -f Dockerfile -t phish-mail-frontend:latest .

