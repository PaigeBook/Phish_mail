version: "3.9"

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - BACKEND_MODEL_PATH=/app/models/phish_model.joblib
      - BACKEND_MODEL_META_PATH=/app/models/model_meta.json
      - BACKEND_LOG_LEVEL=INFO
    volumes:
      - ./backend/models:/app/models
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
